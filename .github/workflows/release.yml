name: Release

# Builds Prompt Library installers for macOS (universal) and Windows
# and attaches them to a GitHub Release.
#
# Trigger by either:
#   1. Pushing a tag matching `v*.*.*`  (e.g. `git push origin v1.0.1`), or
#   2. Manual `workflow_dispatch` from the Actions tab.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name (e.g. v1.0.1)"
        required: true
        default: "v1.0.1"

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            args: ""
            rust_targets: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cargo cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm install

      - name: Build & release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          releaseName: "Prompt Library ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}"
          releaseBody: |
            See the [changelog](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for what's new.

            **Downloads**
            - Windows · `Prompt Library_*_x64-setup.exe`
            - macOS · `Prompt Library_*_universal.dmg`

            The macOS build is unsigned. The first launch may require right-click → Open.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
